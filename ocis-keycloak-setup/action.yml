name: 'oCIS Keycloak Setup'
author: 'mklos-kw'
description: 'Start a Keycloak + Postgres stack for oCIS external IDP testing.'

branding:
  icon: 'key'
  color: 'blue'

inputs:
  ocis-domain:
    description: oCIS URL to embed in the realm file (replaces ocis-server:9200 placeholder)
    required: false
    default: https://127.0.0.1:9200
  realm-dist-file:
    description: Path to ocis-ci-realm.dist.json relative to repo root
    required: false
    default: tests/config/ci/ocis-ci-realm.dist.json

outputs:
  keycloak-domain:
    description: Keycloak domain (host:port)
    value: localhost:8443

runs:
  using: composite
  steps:
    - name: Generate Keycloak TLS certs
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p keycloak-certs
        openssl req -x509 -newkey rsa:2048 \
          -keyout keycloak-certs/keycloakkey.pem \
          -out keycloak-certs/keycloakcrt.pem \
          -nodes -days 365 -subj '/CN=keycloak'
        chmod -R 777 keycloak-certs

    - name: Start Postgres
      shell: bash
      run: |
        docker run -d --name postgres --network host \
          -e POSTGRES_DB=keycloak \
          -e POSTGRES_USER=keycloak \
          -e POSTGRES_PASSWORD=keycloak \
          postgres:alpine3.18
        timeout 30 bash -c 'until docker exec postgres pg_isready -U keycloak; do sleep 1; done'
        echo "postgres ready."

    - name: Patch realm file and start Keycloak
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        OCIS_DOMAIN: ${{ inputs.ocis-domain }}
        REALM_DIST: ${{ inputs.realm-dist-file }}
      run: |
        sed "s|https://ocis-server:9200|${OCIS_DOMAIN}|g" "${REALM_DIST}" > /tmp/ocis-realm.json

        docker run -d --name keycloak --network host \
          -e "OCIS_DOMAIN=${OCIS_DOMAIN}" \
          -e KC_HOSTNAME=localhost \
          -e KC_PORT=8443 \
          -e KC_DB=postgres \
          -e "KC_DB_URL=jdbc:postgresql://localhost:5432/keycloak" \
          -e KC_DB_USERNAME=keycloak \
          -e KC_DB_PASSWORD=keycloak \
          -e KC_FEATURES=impersonation \
          -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
          -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
          -e KC_HTTPS_CERTIFICATE_FILE=/keycloak-certs/keycloakcrt.pem \
          -e KC_HTTPS_CERTIFICATE_KEY_FILE=/keycloak-certs/keycloakkey.pem \
          -v "$(pwd)/keycloak-certs:/keycloak-certs:ro" \
          -v "/tmp/ocis-realm.json:/opt/keycloak/data/import/oCIS-realm.json:ro" \
          quay.io/keycloak/keycloak:26.2.5 \
          start-dev --proxy-headers xforwarded \
            --spi-connections-http-client-default-disable-trust-manager=true \
            --import-realm --health-enabled=true

        timeout 300 bash -c 'until curl -skf https://localhost:9000/health/ready; do sleep 3; done' \
          || (echo "=== keycloak logs ===" && docker logs keycloak --tail 80 && exit 1)
        echo "keycloak ready."
