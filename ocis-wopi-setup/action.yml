name: 'oCIS WOPI Setup'
author: 'mklos-kw'
description: 'Start oCIS with WOPI collaboration (builtin ocis-collaboration or cs3 wopiserver).'

branding:
  icon: 'edit-3'
  color: 'blue'

inputs:
  ocis-binary:
    description: Path to a pre-built oCIS binary
    required: false
    default: ""
  ocis-binary-artifact:
    description: Artifact name to download the oCIS binary from (downloads to ocis/bin/ocis)
    required: false
    default: ""
  server-type:
    description: WOPI server type — builtin (ocis collaboration) or cs3 (cs3org/wopiserver)
    required: false
    default: builtin
  wopi-secret:
    description: WOPI secret shared between oCIS and the WOPI server
    required: false
    default: some-wopi-secret

outputs:
  bridge-ip:
    description: Docker bridge gateway IP (reachable from host and containers)
    value: ${{ steps.bridge.outputs.bridge-ip }}
  ocis-url:
    description: oCIS URL using bridge IP
    value: ${{ steps.bridge.outputs.ocis-url }}
  wopi-src:
    description: WOPI source URL (http://{bridge-ip}:9300)
    value: ${{ steps.bridge.outputs.wopi-src }}

runs:
  using: composite
  steps:
    - name: Download oCIS binary artifact
      if: inputs.ocis-binary-artifact != ''
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.ocis-binary-artifact }}
        path: ocis/bin

    - name: Start fakeoffice
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        docker run -d --name wopi-fakeoffice \
          -p 8080:8080 \
          -v "$(pwd):/ocis:ro" \
          python:3-alpine \
          python3 /ocis/tests/config/ci/fakeoffice-server.py

    - name: Get Docker bridge IP
      id: bridge
      shell: bash
      run: |
        BRIDGE_IP=$(docker network inspect bridge \
          --format '{{range .IPAM.Config}}{{.Gateway}}{{end}}')
        echo "bridge-ip=${BRIDGE_IP}" >> "$GITHUB_OUTPUT"
        echo "ocis-url=https://${BRIDGE_IP}:9200" >> "$GITHUB_OUTPUT"
        echo "wopi-src=http://${BRIDGE_IP}:9300" >> "$GITHUB_OUTPUT"
        echo "OCIS_BRIDGE_IP=${BRIDGE_IP}" >> "$GITHUB_ENV"
        echo "Docker bridge IP: ${BRIDGE_IP}"

    - name: Install oCIS binary
      shell: bash
      run: |
        if [[ -n "${{ inputs.ocis-binary-artifact }}" ]]; then
          chmod +x ocis/bin/ocis
          sudo cp ocis/bin/ocis /usr/local/bin/ocis
        else
          sudo cp "${{ inputs.ocis-binary }}" /usr/local/bin/ocis
          sudo chmod +x /usr/local/bin/ocis
        fi

    - name: Init oCIS
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        CONFIG_DIR="${HOME}/.ocis/config"
        mkdir -p "$CONFIG_DIR"
        OCIS_URL="https://${OCIS_BRIDGE_IP}:9200" \
          OCIS_CONFIG_DIR="$CONFIG_DIR" \
          ocis init --insecure true
        cp tests/config/ci/app-registry.yaml "$CONFIG_DIR/app-registry.yaml"

    - name: Start oCIS server
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SERVER_TYPE: ${{ inputs.server-type }}
        WOPI_SECRET: ${{ inputs.wopi-secret }}
      run: |
        CONFIG_DIR="${HOME}/.ocis/config"
        BRIDGE_IP="${OCIS_BRIDGE_IP}"
        OCIS_URL="https://${BRIDGE_IP}:9200"

        EXCLUDE_SERVICES="idp"
        if [[ "${SERVER_TYPE}" == "builtin" ]]; then
          EXCLUDE_SERVICES="idp,app-provider"
        fi

        env \
          OCIS_URL="$OCIS_URL" \
          OCIS_CONFIG_DIR="$CONFIG_DIR" \
          STORAGE_USERS_DRIVER=ocis \
          PROXY_ENABLE_BASIC_AUTH=true \
          OCIS_LOG_LEVEL=error \
          IDM_CREATE_DEMO_USERS=false \
          IDM_ADMIN_PASSWORD=admin \
          OCIS_ASYNC_UPLOADS=true \
          OCIS_EVENTS_ENABLE_TLS=false \
          NATS_NATS_HOST=0.0.0.0 \
          NATS_NATS_PORT=9233 \
          OCIS_JWT_SECRET=some-ocis-jwt-secret \
          EVENTHISTORY_STORE=memory \
          OCIS_EXCLUDE_RUN_SERVICES="$EXCLUDE_SERVICES" \
          GATEWAY_GRPC_ADDR=0.0.0.0:9142 \
          APP_PROVIDER_EXTERNAL_ADDR=com.owncloud.api.app-provider \
          APP_PROVIDER_DRIVER=wopi \
          APP_PROVIDER_WOPI_APP_NAME=FakeOffice \
          "APP_PROVIDER_WOPI_APP_URL=http://${BRIDGE_IP}:8080" \
          APP_PROVIDER_WOPI_INSECURE=true \
          "APP_PROVIDER_WOPI_WOPI_SERVER_EXTERNAL_URL=http://${BRIDGE_IP}:9300" \
          "APP_PROVIDER_WOPI_FOLDER_URL_BASE_URL=https://${BRIDGE_IP}:9200" \
          ocis server > /tmp/ocis-direct.log 2>&1 &
        echo $! > /tmp/ocis-direct.pid
        echo "oCIS started (PID $(cat /tmp/ocis-direct.pid)), log: /tmp/ocis-direct.log"

    - name: Wait for oCIS
      shell: bash
      run: |
        echo "Waiting for oCIS at https://${OCIS_BRIDGE_IP}:9200..."
        timeout 300 bash -c "
          until curl -sk -uadmin:admin https://${OCIS_BRIDGE_IP}:9200/graph/v1.0/users/admin \
                -w \"%{http_code}\" -o /dev/null 2>/dev/null | grep -q \"200\"; do
            sleep 2
          done
        " || (echo "=== oCIS failed to start ===" && cat /tmp/ocis-direct.log | tail -50 && exit 1)
        echo "ocis ready."

    - name: Wait for fakeoffice discovery
      shell: bash
      run: |
        timeout 300 bash -c 'until curl -sf http://localhost:8080/hosting/discovery; do sleep 2; done'
        echo "fakeoffice discovery ready."

    - name: Start collaboration service (builtin)
      if: inputs.server-type == 'builtin'
      shell: bash
      run: |
        BRIDGE_IP="${OCIS_BRIDGE_IP}"
        CONFIG_DIR="${HOME}/.ocis/config"
        WOPI_SECRET="${{ inputs.wopi-secret }}"
        env \
          "OCIS_URL=https://${BRIDGE_IP}:9200" \
          OCIS_CONFIG_DIR="$CONFIG_DIR" \
          MICRO_REGISTRY=nats-js-kv \
          MICRO_REGISTRY_ADDRESS=127.0.0.1:9233 \
          COLLABORATION_LOG_LEVEL=debug \
          COLLABORATION_GRPC_ADDR=0.0.0.0:9301 \
          COLLABORATION_HTTP_ADDR=0.0.0.0:9300 \
          COLLABORATION_DEBUG_ADDR=0.0.0.0:9304 \
          COLLABORATION_APP_PROOF_DISABLE=true \
          COLLABORATION_APP_INSECURE=true \
          COLLABORATION_CS3API_DATAGATEWAY_INSECURE=true \
          OCIS_JWT_SECRET=some-ocis-jwt-secret \
          "COLLABORATION_WOPI_SECRET=${WOPI_SECRET}" \
          COLLABORATION_APP_NAME=FakeOffice \
          COLLABORATION_APP_PRODUCT=Microsoft \
          "COLLABORATION_APP_ADDR=http://${BRIDGE_IP}:8080" \
          "COLLABORATION_WOPI_SRC=http://${BRIDGE_IP}:9300" \
          ocis collaboration server > /tmp/collab-wopi.log 2>&1 &
        echo $! > /tmp/collab-wopi.pid
        echo "Waiting for collaboration service healthz on :9304..."
        timeout 120 bash -c 'until curl -sf http://localhost:9304/healthz; do sleep 2; done' \
          || (cat /tmp/collab-wopi.log | tail -30 && exit 1)
        echo "collaboration service ready."

    - name: Start cs3 WOPI server
      if: inputs.server-type == 'cs3'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        BRIDGE_IP="${OCIS_BRIDGE_IP}"
        sed "s|ocis-server|${BRIDGE_IP}|g" tests/config/ci/wopiserver.conf > /tmp/wopiserver-patched.conf
        echo "123" > /tmp/wopisecret

        docker run -d --name wopi-cs3server \
          -p 9300:9300 \
          -v "/tmp/wopiserver-patched.conf:/etc/wopi/wopiserver.conf" \
          -v "/tmp/wopisecret:/etc/wopi/wopisecret" \
          --entrypoint /app/wopiserver.py \
          cs3org/wopiserver:v10.4.0

        echo "Waiting for cs3 wopi server on :9300..."
        timeout 120 bash -c "
          until python3 -c \"import socket,sys; s=socket.create_connection(('${BRIDGE_IP}',9300),2); s.close()\" 2>/dev/null; do sleep 2; done
        "
        echo "cs3 wopi server ready."
