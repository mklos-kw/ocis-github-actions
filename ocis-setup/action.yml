name: 'oCIS Setup'
author: 'mklos-kw'
description: 'Start an oCIS instance with optional services (antivirus, email, tika, collaboration apps).'

branding:
  icon: 'server'
  color: 'blue'

inputs:
  ocis-version:
    description: oCIS release version (e.g. 8.0.1) or "latest" — ignored when ocis-binary is set
    required: false
    default: latest
  ocis-binary:
    description: Path to a pre-built oCIS binary; skips download when provided
    required: false
    default: ""
  ocis-binary-artifact:
    description: Artifact name to download the oCIS binary from (downloads to ocis/bin/ocis and sets ocis-binary automatically)
    required: false
    default: ""
  ociswrapper-artifact:
    description: Artifact name to download ociswrapper from (downloads to /usr/local/bin/ociswrapper)
    required: false
    default: ""
  admin-password:
    description: Admin user password
    required: false
    default: admin
  log-level:
    description: oCIS log level
    required: false
    default: error
  demo-users:
    description: Create demo users (IDM_CREATE_DEMO_USERS=true)
    required: false
    default: "false"
  wrapper:
    description: Start ociswrapper on :5200 for dynamic reconfiguration; set to "false" to run ocis server directly
    required: false
    default: "true"
  tika:
    description: Start Apache Tika on :9998 for full-text search
    required: false
    default: "false"
  email:
    description: Start Mailpit SMTP (:1025) and API (:8025)
    required: false
    default: "false"
  antivirus:
    description: Start ClamAV on :3310 and enable postprocessing
    required: false
    default: "false"
  extra-server-env:
    description: JSON object of additional env vars to pass to the oCIS server
    required: false
    default: "{}"
  keycloak:
    description: Start oCIS with Keycloak as external IDP (uses ocis server directly, skips ociswrapper)
    required: false
    default: "false"
  ocis-url:
    description: oCIS base URL used for init and server startup (use https://127.0.0.1:9200 for e2e tests)
    required: false
    default: "https://localhost:9200"
  ocis-config-dir:
    description: oCIS config directory path; defaults to ~/.ocis/config
    required: false
    default: ""
  pid-file:
    description: File path to write the oCIS process PID
    required: false
    default: /tmp/ocis-wrapper.pid
  log-file:
    description: File path for oCIS server log output
    required: false
    default: /tmp/ocis-server.log
  skip-test-runner-setup:
    description: Skip PHP/libcurl/Composer setup (set to "true" for secondary instances that share the test runner)
    required: false
    default: "false"
  collaboration-apps:
    description: Comma-separated WOPI collaboration apps to start — collabora, onlyoffice, fakeoffice
    required: false
    default: ""
  collabora-image:
    description: Collabora CODE Docker image
    required: false
    default: collabora/code:24.04.5.1.1
  onlyoffice-image:
    description: OnlyOffice Document Server Docker image
    required: false
    default: onlyoffice/documentserver:9.0.0

outputs:
  ocis-url:
    description: oCIS instance URL
    value: ${{ inputs.ocis-url }}

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # 0. Download artifacts (when callers use artifact names instead of paths)
    # -------------------------------------------------------------------------
    - name: Download oCIS binary artifact
      if: inputs.ocis-binary-artifact != ''
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.ocis-binary-artifact }}
        path: ocis/bin

    - name: Download ociswrapper artifact
      if: inputs.ociswrapper-artifact != '' && inputs.wrapper != 'false'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.ociswrapper-artifact }}
        path: /usr/local/bin

    - name: Mark downloaded binaries executable
      if: inputs.ocis-binary-artifact != '' || (inputs.ociswrapper-artifact != '' && inputs.wrapper != 'false')
      shell: bash
      run: |
        [[ -n "${{ inputs.ocis-binary-artifact }}" ]] && chmod +x ocis/bin/ocis || true
        [[ -n "${{ inputs.ociswrapper-artifact }}" && "${{ inputs.wrapper }}" != "false" ]] && chmod +x /usr/local/bin/ociswrapper || true

    # -------------------------------------------------------------------------
    # 1. Install oCIS binary (skip when a pre-built binary is provided)
    # -------------------------------------------------------------------------
    - name: Install oCIS binary from release
      if: inputs.ocis-binary == '' && inputs.ocis-binary-artifact == ''
      shell: bash
      env:
        OCIS_VERSION: ${{ inputs.ocis-version }}
      run: ${{ github.action_path }}/scripts/install-ocis.sh

    - name: Use pre-built oCIS binary
      if: inputs.ocis-binary != '' && inputs.ocis-binary-artifact == ''
      shell: bash
      run: |
        sudo cp "${{ inputs.ocis-binary }}" /usr/local/bin/ocis
        sudo chmod +x /usr/local/bin/ocis
        echo "Using pre-built oCIS: $(ocis --version 2>&1 | head -1)"

    - name: Install artifact oCIS binary system-wide
      if: inputs.ocis-binary-artifact != ''
      shell: bash
      run: |
        sudo cp ocis/bin/ocis /usr/local/bin/ocis
        echo "Using oCIS from artifact: $(ocis --version 2>&1 | head -1)"

    # -------------------------------------------------------------------------
    # 2. Build ociswrapper (only when using ociswrapper mode)
    # -------------------------------------------------------------------------
    - name: Build ociswrapper from source (when using release binary)
      if: inputs.ocis-binary == '' && inputs.ocis-binary-artifact == '' && inputs.wrapper != 'false' && inputs.keycloak != 'true'
      shell: bash
      env:
        OCIS_VERSION: ${{ inputs.ocis-version }}
      run: ${{ github.action_path }}/scripts/install-wrapper.sh

    - name: Build ociswrapper from local source (when using pre-built binary)
      if: (inputs.ocis-binary != '' || inputs.ocis-binary-artifact != '') && inputs.ociswrapper-artifact == '' && inputs.wrapper != 'false' && inputs.keycloak != 'true'
      shell: bash
      working-directory: ${{ github.workspace }}/tests/ociswrapper
      run: |
        if command -v ociswrapper &>/dev/null; then
          echo "ociswrapper already installed: $(ociswrapper --version 2>&1 | head -1)"
        else
          GOWORK=off go build -o /tmp/ociswrapper .
          sudo mv /tmp/ociswrapper /usr/local/bin/ociswrapper
          echo "ociswrapper built from local source."
        fi

    # -------------------------------------------------------------------------
    # 3. Optional services
    # -------------------------------------------------------------------------
    - name: Start Mailpit (email)
      if: inputs.email == 'true'
      shell: bash
      run: |
        docker run -d --name mailpit --network host axllent/mailpit:v1.22.3
        timeout 60 bash -c 'until curl -sf http://localhost:8025/api/v1/messages; do sleep 1; done'
        echo "mailpit ready."

    - name: Start ClamAV (antivirus)
      if: inputs.antivirus == 'true'
      shell: bash
      run: |
        docker run -d --name clamav --network host owncloudci/clamavd
        echo "Waiting for ClamAV on :3310 (may take up to 5 min for virus DB download)..."
        timeout 300 bash -c '
          while true; do
            if (echo "" | nc -z localhost 3310) 2>/dev/null || \
               python3 -c "import socket,sys; s=socket.create_connection((\"localhost\",3310),2); s.close()" 2>/dev/null; then
              break
            fi
            sleep 2
          done
        '
        echo "clamav ready."

    - name: Start Tika (full-text search)
      if: inputs.tika == 'true'
      shell: bash
      run: |
        docker run -d --name tika --network host apache/tika:3.2.2.0-full
        timeout 120 bash -c 'until curl -sf http://localhost:9998; do sleep 2; done'
        echo "tika ready."

    # -------------------------------------------------------------------------
    # 4. Install test-runner dependencies (skipped for secondary instances)
    # -------------------------------------------------------------------------
    - name: Install libcurl 8.12.0 build dependencies
      if: inputs.skip-test-runner-setup != 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo NEEDRESTART_MODE=a apt-get install -y \
          libssl-dev libnghttp2-dev libpsl-dev libldap-dev libssh-dev zlib1g-dev libvips-dev

    - name: Cache libcurl 8.12.0
      if: inputs.skip-test-runner-setup != 'true'
      id: cache-libcurl
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: /opt/libcurl
        key: libcurl-8.12.0-${{ runner.os }}

    - name: Compile libcurl 8.12.0 from source
      if: inputs.skip-test-runner-setup != 'true' && steps.cache-libcurl.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd /tmp
        curl -sLO https://curl.se/download/curl-8.12.0.tar.gz
        tar xzf curl-8.12.0.tar.gz
        cd curl-8.12.0
        ./configure --with-ssl --with-zlib --with-nghttp2 --prefix=/opt/libcurl \
          --enable-versioned-symbols --silent
        make -j$(nproc) --silent
        sudo make install --silent

    - name: Restore libcurl ldconfig
      if: inputs.skip-test-runner-setup != 'true'
      shell: bash
      run: |
        echo "/opt/libcurl/lib" | sudo tee /etc/ld.so.conf.d/libcurl-8.conf
        sudo ldconfig
        /opt/libcurl/bin/curl --version | head -1
        php -r '
          $v = curl_version()["version"];
          echo "PHP curl: $v\n";
          if (version_compare($v, "8.12.0", "<")) {
            fwrite(STDERR, "FATAL: PHP sees libcurl $v, need >= 8.12.0\n");
            exit(1);
          }
        '

    - name: Install Composer dependencies
      if: inputs.skip-test-runner-setup != 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        COMPOSER_NO_INTERACTION=1 COMPOSER_NO_AUDIT=1 composer install --no-progress
        COMPOSER_NO_INTERACTION=1 COMPOSER_NO_AUDIT=1 \
          composer bin behat install --no-progress

    # -------------------------------------------------------------------------
    # 5. Init oCIS + copy config files
    # -------------------------------------------------------------------------
    - name: Init oCIS
      shell: bash
      env:
        OCIS_ACTION_PATH: ${{ github.action_path }}
        OCIS_URL: ${{ inputs.ocis-url }}
        OCIS_CONFIG_DIR_INPUT: ${{ inputs.ocis-config-dir }}
      run: ${{ github.action_path }}/scripts/init-ocis.sh

    # -------------------------------------------------------------------------
    # 6. Start oCIS via ociswrapper (or directly when wrapper: false)
    # -------------------------------------------------------------------------
    - name: Start oCIS
      shell: bash
      env:
        ADMIN_PASSWORD: ${{ inputs.admin-password }}
        LOG_LEVEL: ${{ inputs.log-level }}
        DEMO_USERS: ${{ inputs.demo-users }}
        ANTIVIRUS_ENABLED: ${{ inputs.antivirus }}
        EMAIL_ENABLED: ${{ inputs.email }}
        TIKA_ENABLED: ${{ inputs.tika }}
        KEYCLOAK_ENABLED: ${{ inputs.keycloak }}
        WRAPPER_ENABLED: ${{ inputs.wrapper }}
        EXTRA_SERVER_ENV: ${{ inputs.extra-server-env }}
        OCIS_REPO_ROOT: ${{ github.workspace }}
        OCIS_URL_OVERRIDE: ${{ inputs.ocis-url }}
        OCIS_CONFIG_DIR_INPUT: ${{ inputs.ocis-config-dir }}
        PID_FILE: ${{ inputs.pid-file }}
        LOG_FILE: ${{ inputs.log-file }}
      run: ${{ github.action_path }}/scripts/start-ocis.sh

    # -------------------------------------------------------------------------
    # 7. Wait for oCIS to be healthy
    # -------------------------------------------------------------------------
    - name: Wait for oCIS
      shell: bash
      env:
        KEYCLOAK_ENABLED: ${{ inputs.keycloak }}
        OCIS_URL: ${{ inputs.ocis-url }}
        LOG_FILE: ${{ inputs.log-file }}
      run: |
        echo "Waiting for oCIS at ${OCIS_URL}..."
        if [[ "${KEYCLOAK_ENABLED:-false}" == "true" ]]; then
          timeout 300 bash -c '
            until curl -sk "${OCIS_URL}/.well-known/openid-configuration" \
                  -w "%{http_code}" -o /dev/null 2>/dev/null | grep -q "200"; do
              sleep 2
            done
          ' || (echo "=== oCIS failed to start ===" && cat "${LOG_FILE}" 2>/dev/null | tail -50 && exit 1)
        else
          timeout 300 bash -c '
            until curl -sk -uadmin:admin "${OCIS_URL}/graph/v1.0/users/admin" \
                  -w "%{http_code}" -o /dev/null 2>/dev/null | grep -q "200"; do
              sleep 2
            done
          ' || (echo "=== oCIS failed to start ===" && cat "${LOG_FILE}" 2>/dev/null | tail -50 && exit 1)
        fi
        echo "ocis ready."

    # -------------------------------------------------------------------------
    # 8. Optional WOPI collaboration apps
    # -------------------------------------------------------------------------
    - name: Start FakeOffice
      if: contains(inputs.collaboration-apps, 'fakeoffice')
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        docker run -d --name fakeoffice --network host \
          -v "$(pwd):/ocis:ro" \
          python:3-alpine \
          python3 /ocis/tests/config/ci/fakeoffice-server.py

    - name: Start Collabora
      if: contains(inputs.collaboration-apps, 'collabora')
      shell: bash
      run: |
        docker run -d --name collabora --network host \
          -e DONT_GEN_SSL_CERT=set \
          -e "extra_params=--o:ssl.enable=true --o:ssl.termination=true --o:welcome.enable=false --o:net.frame_ancestors=${{ inputs.ocis-url }}" \
          --entrypoint /bin/sh \
          ${{ inputs.collabora-image }} \
          -c "set -e; coolconfig generate-proof-key; bash /start-collabora-online.sh"

    - name: Start OnlyOffice
      if: contains(inputs.collaboration-apps, 'onlyoffice')
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        sudo systemctl stop postgresql || true
        docker run -d --name onlyoffice --network host \
          -e WOPI_ENABLED=true \
          -e USE_UNAUTHORIZED_STORAGE=true \
          -v "$(pwd)/tests/config/ci/only-office.json:/tmp/only-office.json:ro" \
          -v "$(pwd)/tests/config/ci/onlyoffice-entrypoint.sh:/entrypoint.sh:ro" \
          --entrypoint /bin/sh \
          ${{ inputs.onlyoffice-image }} \
          /entrypoint.sh

    - name: Wait for WOPI app discovery endpoints
      if: inputs.collaboration-apps != ''
      shell: bash
      env:
        COLLAB_APPS: ${{ inputs.collaboration-apps }}
      run: |
        [[ "$COLLAB_APPS" == *fakeoffice* ]] && {
          echo "Waiting for fakeoffice /hosting/discovery..."
          timeout 300 bash -c 'until curl -sf http://localhost:8080/hosting/discovery; do sleep 2; done'
        }
        [[ "$COLLAB_APPS" == *collabora* ]] && {
          echo "Waiting for collabora /hosting/discovery..."
          timeout 300 bash -c 'until curl -sfk https://localhost:9980/hosting/discovery; do sleep 2; done'
        }
        [[ "$COLLAB_APPS" == *onlyoffice* ]] && {
          echo "Waiting for onlyoffice /hosting/discovery..."
          timeout 300 bash -c 'until curl -sfk https://localhost:443/hosting/discovery; do sleep 2; done'
        }
        echo "WOPI apps ready."

    - name: Start collaboration services
      if: inputs.collaboration-apps != ''
      shell: bash
      env:
        COLLAB_APPS: ${{ inputs.collaboration-apps }}
        OCIS_URL: ${{ inputs.ocis-url }}
      run: |
        CONFIG_DIR="${HOME}/.ocis/config"

        start_collab() {
          local name=$1 app_name=$2 product=$3 addr=$4 grpc=$5 http=$6 debug=$7
          env \
            OCIS_URL="$OCIS_URL" \
            OCIS_CONFIG_DIR="$CONFIG_DIR" \
            MICRO_REGISTRY=nats-js-kv \
            MICRO_REGISTRY_ADDRESS="localhost:9233" \
            COLLABORATION_LOG_LEVEL=debug \
            COLLABORATION_GRPC_ADDR="0.0.0.0:${grpc}" \
            COLLABORATION_HTTP_ADDR="0.0.0.0:${http}" \
            COLLABORATION_DEBUG_ADDR="0.0.0.0:${debug}" \
            COLLABORATION_APP_PROOF_DISABLE=true \
            COLLABORATION_APP_INSECURE=true \
            COLLABORATION_CS3API_DATAGATEWAY_INSECURE=true \
            OCIS_JWT_SECRET=some-ocis-jwt-secret \
            COLLABORATION_WOPI_SECRET=some-wopi-secret \
            COLLABORATION_APP_NAME="$app_name" \
            COLLABORATION_APP_PRODUCT="$product" \
            COLLABORATION_APP_ADDR="$addr" \
            COLLABORATION_WOPI_SRC="http://localhost:${http}" \
            ocis collaboration server > "/tmp/collab-${name}.log" 2>&1 &
          echo $! > "/tmp/collab-${name}.pid"
          echo "collaboration-${name} started (PID $!)"
        }

        [[ "$COLLAB_APPS" == *collabora*  ]] && start_collab collabora  Collabora  Collabora  "https://localhost:9980" 9301 9300 9304
        [[ "$COLLAB_APPS" == *onlyoffice* ]] && start_collab onlyoffice OnlyOffice OnlyOffice "https://localhost:443"  9311 9310 9314
        [[ "$COLLAB_APPS" == *fakeoffice* ]] && start_collab fakeoffice FakeOffice Microsoft  "http://localhost:8080"  9321 9320 9324

        for name in collabora onlyoffice fakeoffice; do
          [[ "$COLLAB_APPS" != *$name* ]] && continue
          port=$(case $name in collabora) echo 9304;; onlyoffice) echo 9314;; fakeoffice) echo 9324;; esac)
          echo "Waiting for collaboration-${name} healthz on :${port}..."
          timeout 300 bash -c "until curl -sf http://localhost:${port}/healthz; do sleep 2; done" \
            || (echo "=== collab-${name} log ===" && cat /tmp/collab-${name}.log | tail -30 && exit 1)
        done
        echo "All collaboration services ready."
