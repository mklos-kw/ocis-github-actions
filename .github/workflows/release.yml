name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Update floating major version tag
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | cut -d. -f1)
          git tag -f "${MAJOR}"
          git push -f origin "${MAJOR}"
